services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vibesphere-postgres
    environment:
      POSTGRES_USER: vibesphere
      POSTGRES_PASSWORD: vibesphere
      POSTGRES_DB: vibesphere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibesphere"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vibesphere-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vibesphere-api
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vibesphere:vibesphere@postgres:5432/vibesphere?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/tmp/vibesphere-uploads
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: vibesphere-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vibesphere:vibesphere@postgres:5432/vibesphere?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/tmp/vibesphere-uploads
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: vibesphere-dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
